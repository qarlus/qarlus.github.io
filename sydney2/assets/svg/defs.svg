                        <stop offset="1" stop-color="#4657e8" stop-opacity="0" />
                    </radialGradient>

                    <linearGradient id="soft-violet-band" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0" stop-color="#89f2ff" stop-opacity="0" />
                        <stop offset="0.34" stop-color="#b8d8ff" stop-opacity="0.2" />
                        <stop offset="0.6" stop-color="#f3b6ff" stop-opacity="0.13" />
                        <stop offset="1" stop-color="#8af4ff" stop-opacity="0" />
                    </linearGradient>

                    <linearGradient id="milky-way-fill" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0" stop-color="#bffbff" stop-opacity="0" />
                        <stop offset="0.24" stop-color="#d8fbff" stop-opacity="0.025" />
                        <stop offset="0.5" stop-color="#ffd5f6" stop-opacity="0.045" />
                        <stop offset="0.76" stop-color="#fff8bd" stop-opacity="0.026" />
                        <stop offset="1" stop-color="#bffbff" stop-opacity="0" />
                    </linearGradient>

                    <linearGradient id="sydney-sky-wordmark" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#ffffff" stop-opacity="0.72" />
                        <stop offset="0.48" stop-color="#fff8ff" stop-opacity="0.5" />
                        <stop offset="1" stop-color="#bff8ff" stop-opacity="0.34" />
                    </linearGradient>

                    <filter id="wordmark-soft" x="-30%" y="-70%" width="160%" height="240%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
                        <feColorMatrix
                            in="blur"
                            type="matrix"
                            values="1 0 0 0 0.58  0 1 0 0 0.9  0 0 1 0 1  0 0 0 0.52 0"
                            result="cyan"
                        />
                        <feGaussianBlur in="SourceGraphic" stdDeviation="0.45" result="softText" />
                        <feMerge>
                            <feMergeNode in="cyan" />
                            <feMergeNode in="softText" />
                        </feMerge>
                    </filter>

                    <radialGradient id="planet-pink-glow" cx="50%" cy="50%" r="58%">
                        <stop offset="0" stop-color="#ffd4f2" stop-opacity="0.18" />
                        <stop offset="1" stop-color="#ffd4f2" stop-opacity="0" />
                    </radialGradient>

                    <radialGradient id="planet-cyan-glow" cx="50%" cy="50%" r="58%">
                        <stop offset="0" stop-color="#bffbff" stop-opacity="0.14" />
                        <stop offset="1" stop-color="#bffbff" stop-opacity="0" />
                    </radialGradient>

                    <radialGradient id="star-soft-fill" cx="50%" cy="50%" r="58%">
                        <stop offset="0" stop-color="#fffde6" stop-opacity="1" />
                        <stop offset="0.54" stop-color="#d5fbff" stop-opacity="0.78" />
                        <stop offset="1" stop-color="#d5fbff" stop-opacity="0" />
                    </radialGradient>

                    <linearGradient id="cloud-a" x1="0" y1="0" x2="0" y2="1">
