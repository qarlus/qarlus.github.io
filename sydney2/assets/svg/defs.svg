<defs>
                    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#3347df" />
                        <stop offset="0.42" stop-color="#5268f3" />
                        <stop offset="0.74" stop-color="#66aaf8" />
                        <stop offset="1" stop-color="#8ad9ff" />
                    </linearGradient>

                    <linearGradient id="sky-brush" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#3447d8" stop-opacity="0.32" />
