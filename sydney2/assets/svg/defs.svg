                    <linearGradient id="cloud-b" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#76dcff" />
                        <stop offset="1" stop-color="#5aa8ef" />
                    </linearGradient>

                    <linearGradient id="cloud-pink" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#ffc4ef" />
                        <stop offset="1" stop-color="#f39bdc" />
                    </linearGradient>

                    <linearGradient id="cloud-top" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#d6ffff" />
                        <stop offset="0.55" stop-color="#91eaff" />
                        <stop offset="1" stop-color="#68c4f2" />
                    </linearGradient>

                    <linearGradient id="cloud-shadow" x1="0" y1="0" x2="0" y2="1">
