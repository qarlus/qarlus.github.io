                        <stop offset="0.42" stop-color="#c0efff" />
                        <stop offset="0.78" stop-color="#badff7" />
                        <stop offset="1" stop-color="#f1c3ed" />
                    </linearGradient>

                    <linearGradient id="fur-soft" x1="0.12" y1="0" x2="0.85" y2="1">
                        <stop offset="0" stop-color="#e8ffff" stop-opacity="0.88" />
                        <stop offset="0.58" stop-color="#b9efff" stop-opacity="0.58" />
