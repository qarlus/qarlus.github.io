                        <stop offset="0.46" stop-color="#c6f2ff" />
                        <stop offset="0.78" stop-color="#bddff7" />
                        <stop offset="1" stop-color="#f0c2ed" />
                    </linearGradient>

                    <linearGradient id="ear-inner" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#f8c5f0" />
                        <stop offset="0.52" stop-color="#eeb7ea" />
                        <stop offset="1" stop-color="#aef8ff" />
                    </linearGradient>

                    <radialGradient id="moon-fill" cx="34%" cy="28%" r="78%">
                        <stop offset="0" stop-color="#fffde2" />
                        <stop offset="0.55" stop-color="#fff5af" />
                        <stop offset="1" stop-color="#efd96e" />
                    </radialGradient>

                    <radialGradient id="sparkle-gold-glow" cx="50%" cy="50%" r="58%">
                        <stop offset="0" stop-color="#fffad3" stop-opacity="0.95" />
                        <stop offset="1" stop-color="#fff074" stop-opacity="0" />
                    </radialGradient>

                    <radialGradient id="sparkle-cyan-glow" cx="50%" cy="50%" r="58%">
                        <stop offset="0" stop-color="#bafcff" stop-opacity="0.82" />
                        <stop offset="0.56" stop-color="#a7f6ff" stop-opacity="0.28" />
                        <stop offset="1" stop-color="#8ff5ff" stop-opacity="0" />
                    </radialGradient>

                    <radialGradient id="sparkle-pink-glow" cx="50%" cy="50%" r="58%">
                        <stop offset="0" stop-color="#ffd3f3" stop-opacity="0.72" />
                        <stop offset="0.58" stop-color="#ffc4ed" stop-opacity="0.24" />
                        <stop offset="1" stop-color="#ffb4e6" stop-opacity="0" />
                    </radialGradient>

                    <linearGradient id="sparkle-ribbon-gradient" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0" stop-color="#bffbff" stop-opacity="0" />
                        <stop offset="0.32" stop-color="#bffbff" stop-opacity="0.72" />
                        <stop offset="0.62" stop-color="#fff8b8" stop-opacity="0.92" />
                        <stop offset="1" stop-color="#ffccef" stop-opacity="0" />
                    </linearGradient>

                    <filter id="cloud-soft" x="-5%" y="-10%" width="110%" height="125%">
                        <feTurbulence baseFrequency="0.014" numOctaves="2" seed="13" type="fractalNoise" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.1" />
                    </filter>

                    <filter id="sky-soft" x="-12%" y="-12%" width="124%" height="124%">
                        <feGaussianBlur stdDeviation="8" />
                    </filter>

                    <filter id="ambient-star-glow" x="-160%" y="-160%" width="420%" height="420%">
                        <feGaussianBlur stdDeviation="2.2" result="blur" />
                        <feColorMatrix
                            in="blur"
                            type="matrix"
                            values="1 0 0 0 0.72  0 1 0 0 0.92  0 0 1 0 1  0 0 0 0.42 0"
                            result="halo"
                        />
                        <feMerge>
                            <feMergeNode in="halo" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>

                    <filter id="moon-glow" x="-110%" y="-110%" width="320%" height="320%">
                        <feGaussianBlur stdDeviation="7.5" result="blur" />
                        <feColorMatrix
                            in="blur"
                            type="matrix"
                            values="1 0 0 0 1  0 1 0 0 0.86  0 0 1 0 0.32  0 0 0 0.58 0"
                            result="glow"
                        />
                        <feMerge>
                            <feMergeNode in="glow" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>

                    <filter id="fur-glow" x="-35%" y="-45%" width="170%" height="190%">
                        <feGaussianBlur stdDeviation="3.2" result="blur" />
                        <feColorMatrix
                            in="blur"
                            type="matrix"
                            values="1 0 0 0 0.9  0 1 0 0 0.88  0 0 1 0 0.45  0 0 0 0.5 0"
                            result="warm"
                        />
                        <feMerge>
                            <feMergeNode in="warm" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>

                    <filter id="star-glow" x="-130%" y="-130%" width="360%" height="360%">
                        <feGaussianBlur stdDeviation="4.4" result="blur" />
                        <feColorMatrix
                            in="blur"
                            type="matrix"
                            values="1 0 0 0 0.72  0 1 0 0 0.94  0 0 1 0 1  0 0 0 0.62 0"
                            result="halo"
                        />
                        <feMerge>
                            <feMergeNode in="halo" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>

                </defs>
